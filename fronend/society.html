<!DOCTYPE html>
<html>

<head>
    <script>
        function save() {
            let society_name = document.getElementById("society_name").value;
            let president = document.getElementById("president").value;
            let reg_number = document.getElementById("reg_number").value;
            let date_of_purchase = document.getElementById("date_of_purchase").value;

            let room_size = "";
            if (document.getElementById("1bhk").checked) {
                room_size = document.getElementById("1bhk").value;
            }

            else if (document.getElementById("2BHK").checked) {
                room_size = document.getElementById("2BHK").value;
            }

            else if (document.getElementById("3BHK").checked) {
                room_size = document.getElementById("3BHK").value;
            }

            let house = document.getElementById("house").value;
            let city = document.getElementById("city").value;
            let pincode = document.getElementById("pincode").value;
            let file = document.getElementById("file").value;
            let bank_details = document.getElementById("bank_details").value;

            let data = {
                society_name: society_name,
                president: president,
                reg_number: reg_number,
                date_of_purchase: date_of_purchase,
                room_size: room_size,
                house: house,
                city: city,
                pincode: pincode,
                file: file,
                bank_details: bank_details

            }
            console.log(data)

            fetch("http://127.0.0.1:8000/save-user", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            })
                .then(res => res.json())
                .then(data => {


                    alert(data.message);


                })





        }

        function get() {
            let id = document.getElementById("id").value;
            if (id == "") {
                alert("INVALID ID");
                return false;
            }
            let data = {
                id: id
            }



            fetch("http://127.0.0.1:8000/get-user", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            })
                .then(res => res.json())
                .then(data => {
                    console.log(data)
                    document.getElementById("society_name").value = data.society_name;
                    document.getElementById("president").value = data.president;
                    document.getElementById("reg_number").value = data.reg_number;
                    document.getElementById("date_of_purchase").value = data.date_of_purchase;

                    let room_size = "";
                    if (document.getElementById("1bhk").checked) {
                        room_size = document.getElementById("1bhk").value= true;
                    }

                    else if (document.getElementById("2BHK").checked) {
                        room_size = document.getElementById("2BHK").value= true;
                    }

                    else if (document.getElementById("3BHK").checked) {
                        room_size = document.getElementById("3BHK").value= true;
                    } 
                    document.getElementById("house").value = data.house;
                    document.getElementById("city").value = data.city;
                    document.getElementById("pincode").value = data.pincode;
                    document.getElementById("file").value = data.file;
                    document.getElementById("bank_details").value = data.bank_details;



                })
        }
    </script>
</head>

<body>
    <form>
        <label for="id">enter id</label>
        <input type="text" id="id" name="id" value=""><br><br>

        <label for="society_name">Enter your society name :</label>
        <input type="text" id="society_name" name="society_name" value=""><br><br>

        <label for="president">Enter the president name :</label>
        <input type="text" id="president" name="president" value=""><br><br>

        <label for="reg_number">Enter your reg number :</label>
        <input type="number" id="reg_number" name="reg_number" value=""><br><br>

        <label for="date_of_purchase">Date for purchase :</label>
        <input type="date" id="date_of_purchase" name="date_of_purchase" value=""><br><br>

        <label for="room_size">Enter your room size :</label>
        <input type="radio" id="1bhk" name="room_size" value="1BHK">
        <label for="1BHK">1BHK</label>
        <input type="radio" id="2BHK" name="room_size" value="2BHK">
        <label for="2BHK">2BHK</label>
        <input type="radio" id="3BHK" name="room_size" value="3BHK">
        <label for="3BHK">3BHK</label><br><br>

        <label for="society_type">Enter the type of house :</label>
        <select id="house" name="house">
            <option value="Flat">Flat</option>
            <option value="Affordable flat">Affordable Flat</option>
            <option value="DDA flat">DDA Flat</option>
        </select><br><br>

        <label for="city">Enter the city :</label>
        <input type="text" id="city" name="city" value=""><br><br>

        <label for="pincode">Enter the pincode :</label>
        <input type="number" id="pincode" name="pincode" value=""><br><br>

        <label for="file">Upload your Identity proof- aadhar/pan :</label>
        <input type="file" id="file" name="file" value=""><br><br>

        <label for="bank_details">Enter your bank acc number :</label>
        <input type="number" id="bank_details" name="bank_details" value=""><br><br>

        <input type="reset" value="reset"><br><br>
    </form>

    <button onclick="save()">Submit the form</button><br><br>
    <button onclick="get()">Get</button>
</body>

</html>
