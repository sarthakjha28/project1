<!DOCTYPE html>
<html>

<head>
    <script>
        function save() {
            let firstname = document.getElementById("firstname").value;
            if (firstname == "") {
                alert("Firstname is mandotry !!!")
                return false;
            }

            let lastname = document.getElementById("lastname").value;

            let gender = "";

            if (document.getElementById("male").checked) {
                gender = "male";
            }
            else if (document.getElementById("female").checked) {
                gender = "female";
            }
            else {
                alert("GENDER IS MISSING");
                return false;
            }

            let email = document.getElementById("email").value;
            if (!email.includes("@") || !email.includes(".")) {
                alert("CHECK YOUR EMAIL AGAIN");
                return false;
            }

            let age = document.getElementById("age").value;
            if (age < 18 || age > 120) {
                alert("INVALID AGE");
                return false;
            }
            let password = document.getElementById("password").value;

            let subjects = []

            if (document.getElementById("subject1").checked) {
                subjects.push(document.getElementById("subject1").value)
            }
            if (document.getElementById("subject2").checked) {
                subjects.push(document.getElementById("subject2").value)
            }

            if (document.getElementById("subject3").checked) {
                subjects.push(document.getElementById("subject3").value)
            }

            let dateofsubmitting = document.getElementById("dateofsubmitting").value;
            if (dateofsubmitting == "") {
                alert("DATE IS MISSING");
                return false;
            }

            let data = {
                firstname: firstname,
                lastname: lastname,
                gender: gender,
                email: email,
                age: age,
                password: password,
                subjects: subjects,
                dateofsubmitting: dateofsubmitting
            }
            console.log(data)

            fetch("http://127.0.0.1:8000/save-user", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            })
                .then(res => res.json())
                .then(data => {
                    console.log(data.message)

                })
        }

        function get() {
            let id = document.getElementById("id").value;

            if (id == "") {
                alert("Invalid ID!!!");
                return false;
            };

            let data = {
                id: id
            }




            fetch("http://127.0.0.1:8000/get-user", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            })
                .then(res => res.json())
                .then(data => {
                    console.log(data)
                    document.getElementById("firstname").value = data.firstname;
                    document.getElementById("lastname").value = data.lastname;
                    document.getElementById("gender").value = data.gender;
                    document.getElementById("email").value = data.email;
                    document.getElementById("password").value = data.password;
                    document.getElementById("subjects").value = data.subjects;
                    document.getElementById("dateofsubmitting").value = data.dateofsubmitting;



                })
        }

    </script>

</head>

<body>
    <form>
        <label for="id">userid :</label>
        <input type="text" id="id" name="id" value=""> <br><br>

        <label for="firstname">Enter First Name :</label>
        <input type="text" id="firstname" name="firstname" value=""><br><br>

        <label for="lastname">Enter Your Last Name :</label>
        <input type="text" id="lastname" name="lastname" value=""><br><br>

        <label for="Gender">Select Your Gender :</label>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label><br><br>

        <label for="email">Enter Your Email :</label>
        <input type="email" id="email" name="email" value=""><br><br>

        <label for="age">Enter Your Age :</label>
        <input type="number" id="age" name="age" value=""><br><br>

        <label for="password">Enter Your password</label>
        <input type="password" id="password" name="password" value=""><br><br>

        <label for="subjects">Enter The subjects </label>

        <input type="checkbox" id="subject1" name="subject1" value="Maths">
        <label for="subject1">Maths</label>
        <input type="checkbox" id="subject2" name="subject2" value="Science">
        <label for="subject2">Science</label>
        <input type="checkbox" id="subject3" name="subject3" value="SST">
        <label for="subject3">SST</label><br><br>

        <label for="dateofsubmitting">Enter The date</label>
        <input type="date" id="dateofsubmitting" name="dateofsubmitting" value=""><br><br>


    </form>

    <button onclick="save()"> Save </button><br><br>
    <button onclick="get()"> Get </button>

</body>

</html>
