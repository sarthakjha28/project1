<!DOCTYPE html>
<html>

<head>
    <script>
        function save() {

            let firstname = document.getElementById("firstname").value;
            if (firstname == "") {
                alert("first name is mandotry !!!");
                return false;
            };

            let lastname = document.getElementById("lastname").value;

            let email = document.getElementById("email").value;
            if (!email.includes("@") || !email.includes(".")) {
                alert("invlaid email !!");
                return false;
            }

            let phone = document.getElementById("phone").value;
            if (phone.includes("@") || phone.includes("#")) {
                alert("invalid phone number !!!");
                return false;
            }

            let age = document.getElementById("age").value;
            if (age < 0 || age > 120) {
                alert("enter a valid age!!");
                return false;
            }

            let dateofvisit = document.getElementById("dateofvisit").value;
            if (dateofvisit == "") {
                alert("dob is missing !!!");
                return false;
            }

            let time = document.getElementById("time").value;
            if (time == "") {
                alert("you have not selected the time of visit !!!")
                return false;
            }

            let doctor = document.getElementById("doctor").value;
            if (doctor == "") {
                alert("you have not selected which doctor do you want to meet!!!")
                return false;
            }


            let data = {
                firstname: firstname,
                lastname: lastname,
                email: email,
                phone: phone,
                age: age,
                dateofvisit: dateofvisit,
                time: time,
                doctor: doctor
            }

            // data = {
            //     age: "6",
            //     dateofvisit: "2026-02-05",
            //     doctor: "Dermatologists ",
            //     email: "sarthakjha282003@gmail.com",
            //     firstname: "John",
            //     lastname: "Doe",
            //     phone: "8287533953",
            //     time: "23:00"
            // }

            console.log(data);

            fetch("http://127.0.0.1:8000/save-user", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            })
                .then(res => res.json())
                .then(data => {
                    console.log(data.message)

                })





        }

        function get() {
            let id = document.getElementById("id").value;

            if (id == "") {
                alert("Invalid ID!!!");
                return false;
            };

            let data = {
                id: id
            }

            fetch("http://127.0.0.1:8000/get-user", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            })
                .then(res => res.json())
                .then(data => {
                    console.log(data)
                    document.getElementById("firstname").value = data.firstname;
                    document.getElementById("age").value = data.age;

                })
        }

    </script>

</head>

<body>
    <form>
        <label for="id">enter id</label>
        <input type="text" id="id" name="id" value=""><br><br>

        <label for="firstname"> firstname :</label>
        <input type="text" id="firstname" name="firstname" value=""><br><br>

        <label for="lastname"> lastname :</label>
        <input type="text" id="lastname" name="lastname" value=""><br><br>


        <label for="email">enter your email :</label>
        <input type="email" id="email" name="email" value=""><br><br>

        <label for="phone">enter your phone number</label>
        <input type="tel" id="phone" name="phone" value=""><br><br>

        <label for="age"> enter your age </label>
        <input type="number" id="age" name="age" value=""><br><br>

        <label for="dateofvisit">date of visiting the hospital</label>
        <input type="date" id="dateofvisit" name="dateofvisit" value=""><br><br>

        <label for="time"> time of visit </label>
        <input type="time" id="time" name="time" value=""><br><br>

        <label for="doctor">which doctor do you want to meet:?</label>
        <select id="doctor" name="doctor">
            <option value="Cardiologists ">Cardiologists </option>
            <option value="Dermatologists ">Dermatologists </option>
            <option value="Emergency physicians ">Emergency physicians </option>
            <option value="General surgeons ">General surgeons </option>
            <option value="neurologist ">neurologist </option>
            <option value="Orthopedic surgeons ">Orthopedic surgeons </option>
        </select><br><br>


        <input type="reset" value="reset"><br><br>
    </form>

    <button onclick="save()">Save</button><br><br>
    <button onclick="get()">Get</button>
</body>



</html>
