<!DOCTYPE html>
<html>

<head>
    <Script>
        function save() {
            let firstname = document.getElementById("firstname").value;

            let lastname = document.getElementById("lastname").value;

            let email = document.getElementById("email").value;

            let phone = document.getElementById("phone").value;

            let password = document.getElementById("password").value;

            let gender = document.getElementById("gender").value;

            let dob = document.getElementById("dob").value;

            let age = document.getElementById("age").value;

            let department = document.getElementById("department").value;

            let Joining_date = document.getElementById("Joining_date").value;

            let data = {
                firstname: firstname,
                lastname: lastname,
                email: email,
                phone: phone,
                password: password,
                gender: gender,
                dob: dob,
                age: age,
                department: department,
                Joining_date: Joining_date
            }
            console.log(data);
            fetch("http://127.0.0.1:8000/save-user", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            })
                .then(res => res.json())
                .then(data => {


                    alert(data.message);


                })







        }
    </Script>
</head>

<body>
    <form>
        <label for="firstname">Enter Your First Name :</label>
        <input type="text" id="firstname" name="firstname" value=""><br><br>

        <input type="lastname" id="lastname" name="lastname" value=""><br><br>

        <input type="email" id="email" name="email" value=""><br><br>

        <label for="phone">Enter Your Phone number :</label>
        <input type="number" id="phone" name="phone" value=""><br><br>

        <label for="password">Enter Your Password : </label>
        <input type="password" id="password" name="password" value=""><br><br>

        <label for="gender">Mention Your Gender :</label>
        <input type="radio" id="gender" name="gender" value="male">
        <label for="male">Male</label>
        <input type="radio" id="gender" name="gender" value="female">
        <label for="female">Female</label><br><br>

        <label for="dob">Enter Your Date Of Birth :</label>
        <input type="date" id="dob" name="dob" value=""><br><br>

        <label for="age">Enter Your Age : </label>
        <input type="number" id="age" name="age" value=""><br><br>

        <label for="department"> Mention Your Department : (* HR,IT,Finance,Sales)</label>
        <input type="text" id="department" name="department" value=""><br><br>

        <label for="Joining_date">Enter The Date Of Joining :</label>

        <input type="reset" value="reset"><br><br>
    </form>


    <button onclick="save()">Submit</button><br><br>
