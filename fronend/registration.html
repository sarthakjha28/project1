<!DOCTYPE html>
<html>

<head>
    <script>
        function save() {
            let firstname = document.getElementById("firstname").value;
            if (firstname == "") {
                alert("first name is mandotry !!!");
                return false;
            };

            let lastname = document.getElementById("lastname").value;

            let email = document.getElementById("email").value;
            if (!email.includes("@") || !email.includes(".")) {
                alert("pls check your email address again !!!");
                return false;
            }

            let dob = document.getElementById("dob").value;
            if (dob == "") {
                alert("dob missing !!!")
            }

            let classes = document.getElementById("classes").value;

            let data = {
                firstname: firstname,
                lastname: lastname,
                email: email,
                dob: dob,
                classes: classes
            }

             fetch("http://127.0.0.1:8000/save-user", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            })
                .then(res => res.json())
                .then(data => {
                    console.log(data.message)

                })
        }




        function get() {
            let id = document.getElementById("id").value
            if (id == "") {
                alert("id is missing");
                return false;
            }

            let data = {
                id: id
            }

                fetch("http://127.0.0.1:8000/get-user", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(data)
                })
                    .then(res => res.json())
                    .then(data => {
                        console.log(data)
                        document.getElementById("firstname").value = data.firstname;
                        document.getElementById("lastname").value = data.lastname;
                        document.getElementById("email").value = data.email;
                        document.getElementById("dob").value = data.dob;
                        document.getElementById("classes").value = data.classes;
                    })
        }

    </script>
</head>

<body>
    <form>
        <label for="id">studentid :</label>
        <input type="text" id="id" name="id" value=""><br><br>

        <label for="firstname">firstname :</label>
        <input type="text" id="firstname" name="firstname" value=""><br><br>

        <label for="lastname">lastname :</label>
        <input type="text" id="lastname" name="lastname" value=""><br><br>

        <label for="email">email :</label>
        <input type="email" id="email" name="email" value=""><br><br>

        <label for="dob">dob :</label>
        <input type="date" id="dob" name="dob" value=""><br><br>

        <label for="classes">classes :</label>
        <select id="classes" name="classes">
            <option value="1 classes"> 1 class </option>
            <option value="2 classes"> 2 class </option>
            <option value="3 classes"> 3 class </option>
            <option value="4 classes"> 4 class </option>
            <option value="5 classes"> 5 class </option>
        </select><br><br>
    </form>

    <button onclick="save()">save</button><br><br>
    <button onclick="get()">get</button>
</body>

</html>
