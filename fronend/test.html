<!DOCTYPE html>

<html>

<head>
    <script>
        let abc = "";
        async function on_save_click() {
            abc = await save1();
            alert(abc);
            abc = save2();
            alert(abc);
        }

        async function save1() {
            return new Promise(() => {
                resolve("save1");
            });
            
        }
        function save2() {
            return "save2"
        }
    </script>
</head>


<body>
    <button onclick="on_save_click()">save1</button><br><br>

</body>

</html>
