<html>

<head>
    <title>
        My First Project
    </title>
    <script>

        function get() {
            let userid = document.getElementById("userid").value;
            if (userid == "") {
                alert("User ID missing!!!");
                return false;
            }

            let data = {
                userid: userid,
            };

            fetch("http://127.0.0.1:8000/get-user", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            })
                .then(res => res.json())
                .then(data => {
                    document.getElementById("firstname").value = data.first_name;
                    document.getElementById("lastname").value = data.last_name;
                    if (data.gender === "M") {
                        document.getElementById("male").checked = true;
                    } else {
                        document.getElementById("female").checked = true;
                    }
                    document.getElementById("dob").value = data.dob;
                })
        }

        function save() {
            let firstname = document.getElementById("firstname").value;
            if (firstname == "") {
                alert("First name missing!!!");
                return false;
            }

            let lastname = document.getElementById("lastname").value;

            let gender = "";
            let male = document.getElementById("male").checked;
            if (male == true) {
                //Nothing to do
                gender = "M";
            }
            else {
                let female = document.getElementById("female").checked;
                if (female == true) {
                    //Nothing to do
                    gender = "F";
                }
                else {
                    alert("Gender missing!!!");
                    return false;
                }
            }



            let dob = document.getElementById("dob").value;
            if (dob == "") {
                alert("DOB Missing!!!");
                return false;
            }

            let data = {
                first_name: firstname,
                last_name: lastname,
                gender: gender,
                dob: dob
            };


            fetch("http://127.0.0.1:8000/save-user", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            })
                .then(res => res.json())
                .then(data => {
                    alert(data.message);
                })
        }
    </script>
</head>

<body>
    <label for="userid">userid :</label>
    <input type="text" id="userid" name="userid" value=""> <br><br>

    <label for="firstname">firstname :</label>
    <input type="text" id="firstname" name="firstname" value=""> <br><br>

    <label for="lastname">lastname :</label>
    <input type="text" id="lastname" name="lastname" value=""> <br><br>

    <label for="gender">gender :</label><br>
    <input type="radio" id="male" name="gender" value="male">
    <label for="male">male</label>
    <input type="radio" id="female" name="gender" value="female">
    <label for="female">female</label><br><br>

    <label for="dob">dob</label>
    <input type="date" id="dob" name="dob"> <br><br>

    <!-- <label for="maritalstatus">Marital Status :</label><br>
    <input type="radio" id="married" name="maritalstatus" value="married">
    <label for="married">Married</label>
    <input type="radio" id="unmarried" name="maritalstatus" value="unmarried">
    <label for="unmarried">UnMarried</label><br><br> -->



    <button onclick="save()">Save</button><br><br>
    <button onclick="get()">get</button>
</body>

</html>
