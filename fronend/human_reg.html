<!DOCTYPE html>
<html>

<head>

    <script>
        function save() {
            let firstname = document.getElementById("firstname").value.trim();

            let lastname = document.getElementById("lastname").value;

            let email = document.getElementById("email").value;

            let dob = document.getElementById("dob").value;

            let age = document.getElementById("age").value;

            let time = document.getElementById("time").value;

            let data = {
                firstname: firstname,
                lastname: lastname,
                email: email,
                dob: dob,
                age: age,
                time: time
            }


            // data = { "firstname": "   ss   ", "lastname": "dd", "email": "sarthakjha282003@gmail.com", "dob": "2026-02-05", "age": "22", "time": "23:52" }

            console.log(data);
            fetch("http://127.0.0.1:8000/save-user", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            })
                .then(res => res.json())
                .then(data => {


                    alert(data.message);


                })
        };

        function get() {
            let id = document.getElementById("id").value;
            if (id == "") {
                alert("INVALID ID");
                return false;
            }
            let data = {
                id: id
            }



            fetch("http://127.0.0.1:8000/get-user", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            })
                .then(res => res.json())
                .then(data => {
                    console.log(data)
                    document.getElementById("firstname").value = data.firstname;
                    document.getElementById("lastname").value = data.lastname;
                    document.getElementById("email").value = data.email;
                    document.getElementById("dob").value = data.dob;
                    document.getElementById("age").value = data.age;
                    document.getElementById("time").value = data.time;





                })
        }

    </script>
</head>

<body>
    <form>
        
        <label for="id">enter id</label>
        <input type="text" id="id" name="id" value=""><br><br>

        <label for="firstname">Enter first name :</label>
        <input type="text" id="firstname" name="firstname" value=""><br><br>

        <label for="lastname">Enter last name :</label>
        <input type="text" id="lastname" name="lastname" value=""><br><br>

        <label for="email">Enter your email :</label>
        <input type="text" id="email" name="email" value=""><br><br>

        <label for="dob">Enter the date :</label>
        <input type="date" id="dob" name="dob" value=""><br><br>

        <label for="age">Enter age:</label>
        <input type="number" id="age" name="age" value=""><br><br>

        <label for="time">Enter the time</label>
        <input type="time" id="time" name="time" value=""><br><br>

        <input type="reset" value="reset"><br><br>



    </form>

    <button onclick="save()">Save</button><br><br>
    <button onclick="get()">Get</button>
</body>

</html>
